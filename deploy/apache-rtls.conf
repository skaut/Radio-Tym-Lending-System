<VirtualHost *:80>
    ServerName 127.0.0.1
    ServerAdmin root@localhost
    DocumentRoot /var/www/rtls

    <Directory /var/www/rtls>
        AllowOverride All
        Require all granted
        Options FollowSymLinks
        DirectoryIndex index.php
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/rtls-error.log
    CustomLog ${APACHE_LOG_DIR}/rtls-access.log combined
</VirtualHost>
